# ============================================================
# 批次入庫設定檔
# 填好後執行：python scripts/batch_ingest.py
# ============================================================

defaults:
  language: zh-TW
  group: 台泥企業團
  chunk_strategy: parent_child

targets:

  # ── PDF 文件（本機路徑，支援絕對路徑）────────────────────
  - type: pdf_list
    category: 永續報告書
    fiscal_year: "2024"
    language: zh-TW
    group: 台泥企業團
    company: CIMPOR
    page_offset: 0          # 拆章節時填起始頁偏移，整份填 0
    files:
      - C:\Users\chris.hsu\Documents\CIMPOR_2024_Sustainability.pdf
      # 繼續加入更多 PDF 路徑...

  - type: pdf_list
    category: 年度報告
    fiscal_year: "2024"
    language: zh-TW
    group: 台泥企業團
    company: null           # null = 不指定子公司（代表集團本體）
    files:
      - C:\Users\chris.hsu\Documents\TCC_2024_Annual_Report.pdf

  # ── 網站 / 爬蟲 ──────────────────────────────────────────
  - type: url_list
    category: ESG專區
    fiscal_year: null
    language: zh-TW
    group: 台泥企業團
    urls:
      - https://www.tcc.com.tw/esg/zh-tw
      # 新增更多 URL 在此...

  - type: sitemap
    category: 官網
    fiscal_year: null
    language: zh-TW
    group: 台泥企業團
    url: https://www.tcc.com.tw/sitemap.xml
    max_pages: 300

  - type: crawler
    category: 新聞
    fiscal_year: null
    language: zh-TW
    group: 台泥企業團
    url: https://www.tcc.com.tw/news/zh-tw
    max_depth: 2
    max_pages: 200
